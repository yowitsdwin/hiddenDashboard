<!DOCTYPE html>
<html>
<head>
<title>Student Portal Login</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.error{
color:#f87171;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Portal</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

/*
Developer Note:
Test Accounts

student : student123
admin : superadmin123

TODO:
Move authentication to backend before production
*/

function login(){

let username = document.getElementById("username").value
let password = document.getElementById("password").value

if(username === "student" && password === "student123"){
window.location = "dashboard.html?userId=1"
}

else if(username === "admin" && password === "superadmin123"){
window.location = "dashboard.html?userId=2"
}

else{
document.getElementById("error").innerText="Invalid credentials"
}

}

</script>

</body>
</html>
